name: Update Stats & Cards

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Generate Trophy
        continue-on-error: true
        run: wget -U "${UA}" -O "./assets/trophy.svg" "https://github-profile-trophy-abmmhasan.vercel.app/?username=abmmhasan&theme=dark_lover&column=4&margin-w=10&margin-h=15&no-frame=true&no-bg=true&rank=SSS,SS,S,AAA,AA,A,B,C,SECRET"

      - name: Generate Streak Stats
        continue-on-error: true
        run: wget -U "${UA}" -O "./assets/streak.svg" "https://streak-stats.demolab.com/?user=abmmhasan&theme=transparent&hide_border=true&mode=weekly"

      - name: Generate Commit Stats Card
        continue-on-error: true
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=abmmhasan&count_private=true&show_icons=true&theme=transparent&include_all_commits=true&hide_title=true&hide_border=true
          path: assets/commitStat.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=abmmhasan&layout=compact&langs_count=6
          path: assets/top-langs.svg
          token: ${{ secrets.PAT }}

      - name: Commit All Changes
        run: |
          if [[ $(git status --porcelain) ]]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add assets/
            git commit -m "${{github.workflow}} (${{github.run_number}}/${{github.run_id}})"
            git push
          else
            echo "nothing to commit"
            exit 0
          fi
